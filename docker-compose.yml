# ============================================================
# LABO.COS App — Docker Compose (Développement & Production)
# Services : web, db, redis, celery, celery-beat, nginx
# ============================================================

version: '3.9'

services:

  # ── Base de données PostgreSQL 16 ──
  db:
    image: postgres:16-alpine
    container_name: labocos_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: labocos_db
      POSTGRES_USER: labocos_user
      POSTGRES_PASSWORD: labocos_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labocos_user -d labocos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery Broker + Cache) ──
  redis:
    image: redis:7-alpine
    container_name: labocos_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application Django (Gunicorn) ──
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: labocos_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --settings=labocos.settings.local &&
             python manage.py collectstatic --noinput --settings=labocos.settings.local &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 120 --reload labocos.wsgi:application"
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: labocos.settings.local
      DATABASE_URL: postgres://labocos_user:labocos_pass@db:5432/labocos_db
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ──
  celery:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: labocos_celery
    restart: unless-stopped
    command: celery -A labocos worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
      - media_data:/app/media
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: labocos.settings.local
      DATABASE_URL: postgres://labocos_user:labocos_pass@db:5432/labocos_db
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat (Tâches planifiées) ──
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: labocos_celery_beat
    restart: unless-stopped
    command: celery -A labocos beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: labocos.settings.local
      DATABASE_URL: postgres://labocos_user:labocos_pass@db:5432/labocos_db
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Nginx (Reverse Proxy) ──
  nginx:
    image: nginx:alpine
    container_name: labocos_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      - web

# ── Volumes persistants ──
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media_data:
    driver: local
  static_data:
    driver: local
